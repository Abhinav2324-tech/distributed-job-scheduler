databases:
  - name: job-scheduler-db
    databaseName: job_scheduler
    user: scheduler
    plan: free

services:
  - type: web
    name: job-scheduler-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: job-scheduler-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: http://localhost:5173
      - key: CRON_TICK_INTERVAL_MS
        value: "5000"
      - key: DEAD_WORKER_THRESHOLD_MS
        value: "15000"
      - key: DEAD_WORKER_SWEEP_INTERVAL_MS
        value: "10000"
      - key: REALTIME_BROADCAST_INTERVAL_MS
        value: "2000"

  # Render's free plan doesn't offer the "Background Worker" service type
  # (paid plans only), so this deploys as a "web" service instead - the
  # worker binds $PORT purely to satisfy that requirement (see
  # apps/worker/src/index.ts) and otherwise runs its normal poll loop.
  # On a paid plan, switch `type` to `worker` and drop the port binding.
  - type: web
    name: job-scheduler-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: job-scheduler-db
          property: connectionString
      - key: LOG_LEVEL
        value: info
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: WORKER_POLL_INTERVAL_MS
        value: "1000"
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: "5000"
      - key: WORKER_SHUTDOWN_GRACE_MS
        value: "10000"
      - key: WORKER_QUEUES
        value: ""
